<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Translation</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    .test-text {
      font-size: 24px;
      margin: 20px 0;
      padding: 20px;
      background: #f0f0f0;
      border-radius: 8px;
    }
    button {
      padding: 10px 20px;
      margin: 5px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Тест системи перекладів</h1>
  
  <div>
    <button onclick="testTranslate('ua')">Українська</button>
    <button onclick="testTranslate('ru')">Русский</button>
    <button onclick="testTranslate('en')">English</button>
  </div>
  
  <div class="test-text" data-i18n="nav.home">Головна</div>
  <div class="test-text" data-i18n="nav.about">Про нас</div>
  <div class="test-text" data-i18n="home.hero.title">ASL Company</div>
  
  <div id="debug" style="margin-top: 20px; padding: 20px; background: #ffe; border: 1px solid #cc0;">
    <h3>Debug Info:</h3>
    <pre id="debug-output"></pre>
  </div>
  
  <script src="js/translations.js"></script>
  <script>
    function testTranslate(lang) {
      const debugOutput = document.getElementById('debug-output');
      debugOutput.textContent = 'Testing translation to: ' + lang + '\n';
      debugOutput.textContent += 'translations object exists: ' + (typeof translations !== 'undefined') + '\n';
      debugOutput.textContent += 'translations[' + lang + '] exists: ' + (translations && translations[lang] !== undefined) + '\n';
      
      if (typeof translations === 'undefined') {
        debugOutput.textContent += 'ERROR: translations object is not defined!\n';
        return;
      }
      
      if (!translations[lang]) {
        debugOutput.textContent += 'ERROR: translations for ' + lang + ' not found!\n';
        return;
      }
      
      // Translate all elements
      document.querySelectorAll('[data-i18n]').forEach(element => {
        const key = element.getAttribute('data-i18n');
        if (translations[lang] && translations[lang][key]) {
          element.textContent = translations[lang][key];
          debugOutput.textContent += 'Translated ' + key + ' to: ' + translations[lang][key] + '\n';
        } else {
          debugOutput.textContent += 'WARNING: No translation for key: ' + key + '\n';
        }
      });
      
      debugOutput.textContent += '\nTranslation completed!';
    }
    
    // Test on load
    window.addEventListener('load', function() {
      const debugOutput = document.getElementById('debug-output');
      debugOutput.textContent = 'Page loaded\n';
      debugOutput.textContent += 'translations defined: ' + (typeof translations !== 'undefined') + '\n';
      if (typeof translations !== 'undefined') {
        debugOutput.textContent += 'Available languages: ' + Object.keys(translations).join(', ') + '\n';
        debugOutput.textContent += 'Sample keys in UA: ' + Object.keys(translations.ua).slice(0, 5).join(', ') + '\n';
      }
    });
  </script>
</body>
</html>
