<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Menu</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: #e8e8e8;
    }
    
    .header {
      position: relative;
      background: #0a0a0a;
      border-bottom: 1px solid #D4AF37;
      padding: 1rem;
    }
    
    .header__container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: #D4AF37;
    }
    
    /* Гамбургер */
    .icon-menu {
      width: 30px;
      height: 22px;
      position: relative;
      cursor: pointer;
      background: none;
      border: none;
      z-index: 1001;
    }
    
    .icon-menu span,
    .icon-menu::before,
    .icon-menu::after {
      content: "";
      position: absolute;
      left: 0;
      width: 100%;
      height: 2px;
      background-color: #D4AF37;
    }
    
    .icon-menu::before { top: 0; }
    .icon-menu span { top: 50%; margin-top: -1px; }
    .icon-menu::after { bottom: 0; }
    
    /* Dropdown меню */
    .menu__body {
      position: absolute;
      top: 100%;
      right: 1rem;
      width: 250px;
      margin-top: 0.5rem;
      background: rgba(20, 20, 20, 0.98);
      border: 1px solid rgba(212, 175, 55, 0.4);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: all 0.25s ease;
      z-index: 1000;
    }
    
    .menu-open .menu__body {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    
    .menu__list {
      list-style: none;
      padding: 0.5rem 0;
    }
    
    .menu__item {
      border-bottom: 1px solid rgba(212, 175, 55, 0.1);
    }
    
    .menu__item:last-child {
      border-bottom: none;
    }
    
    .menu__link {
      display: block;
      padding: 0.875rem 1.25rem;
      color: #e8e8e8;
      text-decoration: none;
      transition: background 0.2s ease;
    }
    
    .menu__link:hover {
      background: rgba(212, 175, 55, 0.15);
      color: #D4AF37;
    }
    
    .main {
      padding: 2rem;
      text-align: center;
    }
    
    .status {
      margin-top: 2rem;
      padding: 1rem;
      background: rgba(212, 175, 55, 0.1);
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header__container">
      <div class="logo">ASL Company</div>
      
      <button class="icon-menu" type="button">
        <span></span>
      </button>
      
      <nav class="menu__body">
        <ul class="menu__list">
          <li class="menu__item"><a href="#" class="menu__link">Головна</a></li>
          <li class="menu__item"><a href="#" class="menu__link">Про нас</a></li>
          <li class="menu__item"><a href="#" class="menu__link">Асортимент</a></li>
          <li class="menu__item"><a href="#" class="menu__link">Новини</a></li>
          <li class="menu__item"><a href="#" class="menu__link">Контакти</a></li>
        </ul>
      </nav>
    </div>
  </header>
  
  <main class="main">
    <h1>Тест мобільного меню</h1>
    <p>Натисни на три лінії справа вгорі</p>
    
    <div class="status">
      <p>Статус: <span id="status">Меню закрите</span></p>
      <p>Body class: <span id="bodyClass">-</span></p>
    </div>
  </main>
  
  <script>
    // Простий toggle меню
    const iconMenu = document.querySelector('.icon-menu');
    const statusEl = document.getElementById('status');
    const bodyClassEl = document.getElementById('bodyClass');
    
    function updateStatus() {
      const isOpen = document.body.classList.contains('menu-open');
      statusEl.textContent = isOpen ? 'Меню відкрите' : 'Меню закрите';
      bodyClassEl.textContent = document.body.className || '(пусто)';
    }
    
    iconMenu.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      document.body.classList.toggle('menu-open');
      updateStatus();
      console.log('Menu toggled!', document.body.classList.contains('menu-open'));
    });
    
    // Закрити при кліку поза меню
    document.addEventListener('click', function(e) {
      const menuBody = document.querySelector('.menu__body');
      if (document.body.classList.contains('menu-open') && 
          !menuBody.contains(e.target) && 
          !iconMenu.contains(e.target)) {
        document.body.classList.remove('menu-open');
        updateStatus();
      }
    });
    
    // Закрити при кліку на посилання
    document.querySelectorAll('.menu__link').forEach(link => {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        document.body.classList.remove('menu-open');
        updateStatus();
        alert('Перехід на: ' + this.textContent);
      });
    });
    
    updateStatus();
  </script>
</body>
</html>
